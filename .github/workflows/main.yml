name: Favicon Downloader

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Download favicons
        run: python download_favicons.py

      - name: Upload favicons as artifact
        uses: actions/upload-artifact@v4
        with:
          name: favicons
          path: favicons/
          retention-days: 7
